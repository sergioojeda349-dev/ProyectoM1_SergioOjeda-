<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generador de paletas de colores aleatorias con soporte para formatos HEX y HSL">
    <title>Generador de Paletas de colores</title>
    <!-- Vincular CSS externo -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>    
        <!-- Encabezado semántico -->
    <main id="main-content">
        <header id="titulo">
            <h1>🎨 Generador de Paletas interactivo</h1>
            <p>by Colorfly Studio</p>
            <p class="descripcion">✨ Crea paletas hermosas al instante • Copia códigos con un clic • Formatos HEX y HSL</p>
        </header>

        <!-- Sección de controles semántica -->
        <section aria-labelledby="controles-titulo">
            <h2 id="controles-titulo" class="sr-only">Controles de generación</h2>
            <div class="controles" role="group" aria-label="Opciones de generación de paleta">
                <div class="grupo-control">
                    <label for="tamanio">Tamaño de paleta:</label>
                    <select id="tamanio" aria-label="Selecciona la cantidad de colores en la paleta">
                        <option value="6">6 colores</option>
                        <option value="8">8 colores</option>
                    </select>
                </div>

                <div class="grupo-control">
                    <label for="formato">Formato de color:</label>
                    <select id="formato" aria-label="Selecciona el formato de los códigos de color">
                        <option value="hex">HEX</option>
                        <option value="hsl">HSL</option>
                    </select>
                </div>

                <button class="boton-generar" id="btn-generar" aria-label="Generar una nueva paleta de colores">
                    <span>🔄 Generar Paleta</span>
                </button>
            </div>
        </section>

        <!-- Sección de paleta semántica -->
        <section aria-labelledby="paleta-titulo">
            <h2 id="paleta-titulo" style="display: none;">Paleta de colores generada</h2>
            <div id="paleta" class="paleta" role="region" aria-label="Colores generados" aria-live="polite">
                <div class="mensaje-vacio">
                    Haz clic en "Generar Paleta" para comenzar
                </div>
            </div>
        </section>
        
    </main>
<footer>
        <section>
            <a href="#titulo">Ir al comienzo</a>
            <a href="mailto:sergioojeda349@gmail.com">Contacto</a>
        </section>
        <P>copyright 2026 by colorfly studio</P>
</footer>    
    <!-- Contenedor para notificaciones toast -->
    <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

    <!-- Vincular JavaScript externo -->
    <script src="app.js"></script>
    
</body>
</html>
